version: "3.9"

services:

  # ── PostgreSQL (Clients) ────────────────────────────────────────
  db_clients:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       clients_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db_seeds/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clients_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MySQL (Products) ────────────────────────────────────────────
  db_products:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      products_db
      MYSQL_USER:          mysql
      MYSQL_PASSWORD:      mysql
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db_seeds/init_mysql.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "mysql", "-pmysql"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ── Flask Backend ───────────────────────────────────────────────
  backend_api:
    build: ./backend
    restart: unless-stopped
    environment:
      POSTGRES_HOST:     db_clients
      POSTGRES_DB:       clients_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      MYSQL_HOST:        db_products
      MYSQL_DB:          products_db
      MYSQL_USER:        mysql
      MYSQL_PASSWORD:    mysql
    depends_on:
      db_clients:
        condition: service_healthy
      db_products:
        condition: service_healthy
    networks:
      - app_net

  # ── Nginx Frontend ──────────────────────────────────────────────
  frontend_web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/style.css:/usr/share/nginx/html/style.css:ro
      - ./frontend/script.js:/usr/share/nginx/html/script.js:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend_api
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  pg_data:
  mysql_data:
